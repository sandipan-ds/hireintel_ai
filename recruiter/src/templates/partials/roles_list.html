<!-- Roles list partial -->
<div class="bg-white rounded-lg shadow p-6">
    <h2 class="text-xl font-semibold text-gray-900 mb-4">Available Roles</h2>
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
        {% for role in roles %}
        <div class="border border-gray-200 rounded-lg p-4 hover:border-blue-500 transition cursor-pointer"
             hx-get="/api/htmx/requirements/{{ role.id }}"
             hx-target="#requirements-container"
             hx-swap="innerHTML">
            <h3 class="font-medium text-gray-900">{{ role.name }}</h3>
            <p class="text-sm text-gray-500 mt-1">
                {{ role.requirements_count }} requirements
            </p>
        </div>
        {% endfor %}
    </div>
</div>
