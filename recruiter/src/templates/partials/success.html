<!-- Success message partial -->
<div class="bg-green-50 border border-green-200 rounded-lg p-6">
    <div class="flex items-center">
        <svg class="h-8 w-8 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
        </svg>
        <div class="ml-4">
            <h3 class="text-lg font-medium text-green-800">{{ message }}</h3>
            <p class="text-sm text-green-600 mt-1">
                Config ID: {{ config_id }} | Role: {{ role_name }}
            </p>
            {% if json_path %}
            <p class="text-xs text-green-500 mt-1 font-mono">
                JSON: {{ json_path }}
            </p>
            {% endif %}
        </div>
    </div>
    <div class="mt-4">
        <a href="/configure" class="text-green-700 hover:text-green-900 font-medium">
            Configure another role
        </a>
    </div>
</div>
